<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSD Image Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="left">
      <button id="pickFolderBtn">フォルダを選ぶ</button>
      <button id="prevBtn" title="前の画像">◀</button>
      <button id="nextBtn" title="次の画像">▶</button>
    </div>
    <div class="center">
      <span id="status">フォルダを選んでください</span>
    </div>
    <div class="right">
      <button id="fitBtn">全体表示</button>
      <button id="fillBtn">画面に合わせる</button>
    </div>
  </header>

  <main class="viewer-area">
    <div class="image-wrap">
      <img id="mainImage" alt="画像表示エリア" />
      <div id="emptyMessage" class="empty-message">
        ここに画像が表示されます
      </div>
    </div>
  </main>

  <footer class="thumbbar" id="thumbbar"></footer>

  <script src="app.js"></script>
</body>
</html>
